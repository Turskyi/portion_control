      <script>
            (function () {

                  const kDefaultTitle = 'Portion Control | portioncontrol.ca';
                  const kDefaultDescription =
                        'Portion Control helps you manage food portions and weight without counting calories. Track meals in grams and build healthier habits.';

                  const routeMeta = {
                        '/': {

                              description: kDefaultDescription,
                        },
                        '/about': {
                              title: 'About Portion Control | portioncontrol.ca',
                              description:
                                    'Learn how Portion Control helps you build healthier habits by tracking food portions in grams and following long-term weight trends.',
                        },
                        '/support': {

                        },
                        '/recipes': {

                        },
                        '/educational-content': {
                              title: 'Educational Content | Portion Control',
                              description:
                                    'Explore educational content about nutrition habits, portion sizing, and sustainable weight management.',
                        },
                  };

                  function normalizePath(pathname) {
                        if (!pathname || pathname === '/') {
                              return '/';
                        }

                        return pathname.endsWith('/') ? pathname.slice(0, -1) : pathname;
                  }

                  function getCurrentPath() {
                        const hash = window.location.hash;
                        if (hash && hash.startsWith('#/')) {
                              return normalizePath(hash.slice(1));
                        }
                        return normalizePath(window.location.pathname);
                  }

                  function upsertMeta(selector, attr, value) {
                        if (!value) {
                              return;
                        }

                        let meta = document.head.querySelector(selector);
                        if (!meta) {
                              meta = document.createElement('meta');
                              meta.setAttribute(attr, selector.includes('property=')
                                    ? selector.match(/property=\"([^\"]+)\"/)[1]
                                    : selector.match(/name=\"([^\"]+)\"/)[1]);
                              document.head.appendChild(meta);
                        }
                        meta.setAttribute('content', value);
                  }

                  function updateAlternateLinks(path) {
                        const alternates = [
                              { hreflang: 'x-default', host: kBaseDomain },
                              { hreflang: 'en', host: `en.${kBaseDomain}` },
                              { hreflang: 'fr', host: `fr.${kBaseDomain}` },
                              { hreflang: 'uk', host: `uk.${kBaseDomain}` },
                        ];

                        alternates.forEach(function (item) {
                              const href = `https://${item.host}${path}`;
                              const selector = `link[rel=\"alternate\"][hreflang=\"${item.hreflang}\"]`;
                              let link = document.head.querySelector(selector);
                              if (!link) {
                                    link = document.createElement('link');
                                    link.setAttribute('rel', 'alternate');
                                    link.setAttribute('hreflang', item.hreflang);
                                    document.head.appendChild(link);
                              }
                              link.setAttribute('href', href);
                        });
                  }

                  function updateRouteMetadata() {
                        const path = getCurrentPath();
                        const current = routeMeta[path] || routeMeta['/'];
                        const canonicalUrl = `https://${kBaseDomain}${path}`;

                        document.title = current.title;

                        const canonical = document.head.querySelector('link[rel="canonical"]');
                        if (canonical) {
                              canonical.setAttribute('href', canonicalUrl);
                        }

                        upsertMeta('meta[name="description"]', 'name', current.description);
                        upsertMeta('meta[property="og:title"]', 'property', current.title);
                        upsertMeta('meta[property="og:description"]', 'property', current.description);
                        upsertMeta('meta[property="og:url"]', 'property', canonicalUrl);
                        upsertMeta('meta[name="twitter:title"]', 'name', current.title);
                        upsertMeta('meta[name="twitter:description"]', 'name', current.description);
                        upsertMeta('meta[name="twitter:url"]', 'name', canonicalUrl);
                        updateAlternateLinks(path);
                  }

                  const originalPushState = history.pushState;
                  const originalReplaceState = history.replaceState;

                  history.pushState = function () {
                        const result = originalPushState.apply(this, arguments);
                        updateRouteMetadata();
                        return result;
                  };

                  history.replaceState = function () {
                        const result = originalReplaceState.apply(this, arguments);
                        updateRouteMetadata();
                        return result;
                  };

                  window.addEventListener('popstate', updateRouteMetadata);
                  window.addEventListener('hashchange', updateRouteMetadata);
                  document.addEventListener('DOMContentLoaded', updateRouteMetadata);
            })();
      </script>
